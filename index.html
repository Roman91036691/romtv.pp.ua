<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROMTV</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #3A4636;
        }

        /* --- АНІМОВАНИЙ ФОН --- */
        #no-stream {
            display: flex;
            flex-direction: column; /* Щоб лоадер був під текстом */
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #3A4636, #465441, #3A4636);
            background-size: 200% 200%;
            animation: moveGradient 12s ease infinite;
            position: relative;
            padding: 20px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- ЛОГОТИП --- */
        .logo-box {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 60px; 
            height: auto;
            z-index: 100;
        }

        /* --- ТЕКСТ --- */
        .status-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 15vw, 7.5rem); 
            font-weight: 900;
            color: #FFFFFF;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 20px; /* Відступ до лоадера */
        }

        /* --- ТВІЙ ЛОАДЕР (АДАПТОВАНИЙ) --- */
        .loader {
            width: 120px; /* Трохи збільшив для видимості */
            height: 14px;
            /* Білі смужки на прозорому фоні */
            background: repeating-linear-gradient(-45deg, #ffffff 0 15px, #ffffff00 0 20px) left/200% 100%;
            animation: l3 2s infinite linear;
            opacity: 0.8;
        }

        @keyframes l3 {
            100% { background-position: right; }
        }

        /* --- ПЛЕЄР --- */
        #video-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            z-index: 200;
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="no-stream">
        <div class="logo-box">
            <svg viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="600" height="600" rx="160" fill="url(#paint0_radial_750_298)"/>
                <path d="M318.348 169.362C366.373 169.362 399.798 177.929 418.622 195.064C437.446 211.957 446.858 235.849 446.858 266.74C446.858 287.977 443.117 306.077 435.636 321.04C428.155 335.761 415.002 347.345 396.178 355.792C377.354 363.997 351.411 368.1 318.348 368.1H243.052V431.812H154C155.931 384.993 156.896 341.191 156.896 300.406C156.896 259.621 155.931 215.819 154 169L242.983 169.362H243.052H318.348ZM293.008 298.234C313.039 298.234 328.001 297.51 337.896 296.062C348.032 294.373 355.031 291.477 358.892 287.374C362.995 283.271 365.046 277.238 365.046 269.274C365.046 261.31 363.115 255.397 359.254 251.536C355.634 247.433 348.756 244.658 338.62 243.21C328.725 241.762 313.521 241.038 293.008 241.038H243.052V298.234H293.008Z" fill="url(#paint1_linear_750_298)"/>
                <defs>
                    <radialGradient id="paint0_radial_750_298" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(131 162) rotate(68.9012) scale(469.473)">
                        <stop offset="0.109159" stop-color="#049C77"/>
                        <stop offset="1" stop-color="#063CA2"/>
                    </radialGradient>
                    <linearGradient id="paint1_linear_750_298" x1="481" y1="390.5" x2="166" y2="115.5" gradientUnits="userSpaceOnUse">
                        <stop stop-color="white"/>
                        <stop offset="1" stop-color="#FBFFFB"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <h1 class="status-text">ЕФІРУ НЕМА</h1>
        
        <div class="loader"></div>
    </div>

    <div id="video-container">
        <iframe id="stream-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const API_KEY = 'AIzaSyCV_M3wNcnpb0yuZry6MYlKevQhy0Cyta4';
        const CHANNEL_ID = 'UCnOzsQewWOgyi3ioTF_TjNA';

        async function checkStream() {
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=live&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                const container = document.getElementById('video-container');
                const noStream = document.getElementById('no-stream');
                const iframe = document.getElementById('stream-iframe');

                if (data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    const liveSrc = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=1`;
                    
                    if (iframe.src !== liveSrc) {
                        iframe.src = liveSrc;
                        noStream.style.display = 'none';
                        container.style.display = 'block';
                    }
                } else {
                    iframe.src = "";
                    noStream.style.display = 'flex';
                    container.style.display = 'none';
                }
            } catch (e) { console.error("Помилка:", e); }
        }

        setInterval(checkStream, 45000);
        checkStream();
    </script>
</body>
</html>
