<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROM TV | Очікування</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- ЛІЧИЛЬНИК ГЛЯДАЧІВ (ЛІВИЙ КУТ) --- */
        .viewer-stats {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .viewer-dot {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .viewer-dot.live {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .viewer-count-text {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #eee;
        }

        .viewer-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #777;
            margin-left: 5px;
        }

        /* --- ЛОГОТИП (ПРАВИЙ КУТ) --- */
        .channel-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
            width: clamp(50px, 12vw, 80px);
            height: auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            pointer-events: none; 
        }

        /* --- ЕКРАН ОЧІКУВАННЯ --- */
        #no-stream {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            text-align: center;
            background: linear-gradient(-45deg, #001220, #003049, #004d40, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 5;
            position: relative;
            overflow: hidden;
            perspective: 1000px;
            touch-action: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cursor-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 255, 170, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        .message-box {
            position: relative;
            z-index: 2;
            padding: clamp(30px, 10vw, 50px);
            width: 90%;
            max-width: 450px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            margin-bottom: 10px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #a8ff78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(50px);
        }

        p {
            font-size: 1rem;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            transform: translateZ(30px);
        }

        /* --- ПЛЕЄР --- */
        #video-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            background: #000;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="viewer-stats" id="viewer-box">
        <div class="viewer-dot" id="v-dot"></div>
        <div class="viewer-count-text" id="v-count">0</div>
        <div class="viewer-label" id="v-label">Очікують</div>
    </div>

    <img class="channel-logo" src="retouch_2026041912073655.png" alt="ROM TV">

    <div id="no-stream">
        <div class="cursor-glow" id="glow"></div>
        <div class="message-box" id="tilt-box">
            <h1>ROM TV</h1>
            <p>Ефір скоро почнеться</p>
        </div>
    </div>

    <div id="video-container">
        <iframe id="stream-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const API_KEY = 'AIzaSyCV_M3wNcnpb0yuZry6MYlKevQhy0Cyta4';
        const CHANNEL_ID = 'UCnOzsQewWOgyi3ioTF_TjNA';
        
        const vCount = document.getElementById('v-count');
        const vDot = document.getElementById('v-dot');
        const vLabel = document.getElementById('v-label');

        // --- ДИНАМІЧНИЙ ЗАГОЛОВОК ---
        let titleBlink = null;
        function updateTitle(isLive) {
            clearInterval(titleBlink);
            if (isLive) {
                let showDot = true;
                titleBlink = setInterval(() => {
                    document.title = showDot ? "🔴 LIVE | ROM TV" : "⚪ LIVE | ROM TV";
                    showDot = !showDot;
                }, 1000);
            } else {
                document.title = "○ ROM TV | Відпочиваємо";
            }
        }

        // --- ФУНКЦІЯ ОТРИМАННЯ ГЛЯДАЧІВ ---
        async function getViewerCount(videoId) {
            try {
                const url = `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.items && data.items[0].liveStreamingDetails) {
                    return data.items[0].liveStreamingDetails.concurrentViewers || 0;
                }
                return 0;
            } catch (e) { return 0; }
        }

        // --- ПЕРЕВІРКА СТРІМУ ---
        async function checkStream() {
            try {
                const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=live&key=${API_KEY}`;
                const response = await fetch(searchUrl);
                const data = await response.json();

                const container = document.getElementById('video-container');
                const noStreamScreen = document.getElementById('no-stream');
                const iframe = document.getElementById('stream-iframe');

                if (data.items && data.items.length > 0) {
                    // В ЕФІРІ
                    const videoId = data.items[0].id.videoId;
                    const viewers = await getViewerCount(videoId);
                    
                    vCount.innerText = viewers;
                    vDot.classList.add('live');
                    vLabel.innerText = "Дивляться";
                    
                    if (container.style.display !== 'block') {
                        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3`;
                        noStreamScreen.style.display = 'none';
                        container.style.display = 'block';
                        updateTitle(true);
                    }
                } else {
                    // ОЧІКУВАННЯ
                    vDot.classList.remove('live');
                    vLabel.innerText = "Очікують";
                    // Імітація кількості людей, що чекають (або залиш 0)
                    if(vCount.innerText == "0" || vCount.innerText == "") vCount.innerText = Math.floor(Math.random() * 5) + 1;

                    if (container.style.display === 'block') {
                        iframe.src = "";
                        noStreamScreen.style.display = 'flex';
                        container.style.display = 'none';
                        updateTitle(false);
                    }
                }
            } catch (e) {}
        }

        // ІНТЕРАКТИВ (3D)
        const noStream = document.getElementById('no-stream');
        const tiltBox = document.getElementById('tilt-box');
        const glow = document.getElementById('glow');

        function handleMove(e) {
            let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            glow.style.left = x + 'px'; glow.style.top = y + 'px'; glow.style.opacity = "1";
            const rect = tiltBox.getBoundingClientRect();
            const tx = ((y - (rect.top + rect.height/2)) / (window.innerHeight/2)) * -25;
            const ty = ((x - (rect.left + rect.width/2)) / (window.innerWidth/2)) * 25;
            tiltBox.style.transform = `perspective(1000px) rotateX(${tx}deg) rotateY(${ty}deg) scale3d(1.05, 1.05, 1.05)`;
        }

        noStream.addEventListener('mousemove', handleMove);
        noStream.addEventListener('touchstart', handleMove, {passive: true});
        noStream.addEventListener('touchmove', handleMove, {passive: true});

        checkStream();
        updateTitle(false);
        setInterval(checkStream, 45000);
    </script>
</body>
</html>
