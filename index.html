            <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM TV - LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- ЛОГОТИП КАНАЛУ --- */
        .channel-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
            width: clamp(60px, 10vw, 90px); /* Трохи збільшив, щоб лого було помітним */
            height: auto;
            
            /* Ефект скляної підкладки */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            
            pointer-events: none; 
            animation: logoFadeIn 1.5s ease-out;
        }

        @keyframes logoFadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- ВІДЕО ТА ЕКРАНИ --- */
        #video-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        #no-stream {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 5;
        }

        .message-box {
            padding: 45px;
            border-radius: 45px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            margin-bottom: 12px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .loader-bar {
            width: 50px;
            height: 3px;
            background: #1a1a1a;
            margin: 35px auto 0;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 100%;
            background: #ffffff;
            opacity: 0.3;
            animation: slide 2s infinite ease-in-out;
        }

        @keyframes slide {
            0% { left: -25px; }
            100% { left: 50px; }
        }
    </style>
</head>
<body>

    <img class="channel-logo" src="retouch_2026041912073655.png" alt="ROM TV">

    <div id="no-stream">
        <div class="message-box">
            <h1>Поки що ефіру немає</h1>
            <p>Очікуйте на включення</p>
            <div class="loader-bar"></div>
        </div>
    </div>

    <div id="video-container">
        <iframe id="stream-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const API_KEY = 'AIzaSyCV_M3wNcnpb0yuZry6MYlKevQhy0Cyta4';
        const CHANNEL_ID = 'UCnOzsQewWOgyi3ioTF_TjNA';
        let isLive = false;

        async function checkStream() {
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=live&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                const container = document.getElementById('video-container');
                const noStream = document.getElementById('no-stream');
                const iframe = document.getElementById('stream-iframe');

                if (data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    const newSrc = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3`;
                    
                    if (iframe.src !== newSrc) {
                        iframe.src = newSrc;
                        noStream.style.display = 'none';
                        container.style.display = 'block';
                        isLive = true;
                    }
                } else {
                    if (isLive) {
                        iframe.src = "";
                        noStream.style.display = 'flex';
                        container.style.display = 'none';
                        isLive = false;
                    }
                }
            } catch (error) {
                console.error("Системна помилка:", error);
            }
        }

        checkStream();
        setInterval(checkStream, 45000); // Перевірка кожні 45 секунд
    </script>
</body>
</html>
