<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM TV - LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- ЛОГОТИП КАНАЛУ --- */
        .channel-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
            width: clamp(60px, 10vw, 90px);
            height: auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            pointer-events: none; 
            animation: logoFadeIn 1.5s ease-out;
        }

        @keyframes logoFadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- ВІДЕО-ПЛЕЄР --- */
        #video-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        /* --- ЕКРАН ОЧІКУВАННЯ --- */
        #no-stream {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            text-align: center;
            /* Анімований градієнтний фон у стилі логотипу */
            background: linear-gradient(-45deg, #001220, #003049, #004d40, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 5;
            position: relative;
            overflow: hidden;
            perspective: 1000px; /* Для 3D ефекту */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Інтерактивне світіння за курсором */
        .cursor-glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0, 255, 170, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: width 0.3s, height 0.3s;
        }

        /* 3D Картка з текстом */
        .message-box {
            position: relative;
            z-index: 2;
            padding: 50px;
            border-radius: 30px;
            background: rgba(25, 25, 30, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
            /* Плавне повернення картки на місце */
            transition: transform 0.2s ease-out; 
            transform-style: preserve-3d;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 15px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a8ff78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(30px); /* Ефект висування тексту вперед */
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            transform: translateZ(20px);
        }

        .pulse-ring {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 170, 0.5);
            border-radius: 50%;
            margin: 40px auto 0;
            animation: ringPulse 2s infinite ease-out;
            transform: translateZ(10px);
        }

        @keyframes ringPulse {
            0% { transform: translateZ(10px) scale(0.8); opacity: 1; }
            100% { transform: translateZ(10px) scale(1.8); opacity: 0; }
        }
    </style>
</head>
<body>

    <img class="channel-logo" src="retouch_2026041912073655.png" alt="ROM TV">

    <div id="no-stream">
        <div class="cursor-glow" id="glow"></div>
        <div class="message-box" id="tilt-box">
            <h1>ROM TV</h1>
            <p>Ефір скоро почнеться</p>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <div id="video-container">
        <iframe id="stream-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const API_KEY = 'AIzaSyCV_M3wNcnpb0yuZry6MYlKevQhy0Cyta4';
        const CHANNEL_ID = 'UCnOzsQewWOgyi3ioTF_TjNA';
        let isLive = false;

        // --- ІНТЕРАКТИВ (Світіння та 3D-нахил) ---
        const noStreamScreen = document.getElementById('no-stream');
        const tiltBox = document.getElementById('tilt-box');
        const glow = document.getElementById('glow');

        noStreamScreen.addEventListener('mousemove', (e) => {
            // Рух світіння за курсором
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';

            // 3D нахил картки
            const rect = tiltBox.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            
            // Коефіцієнт нахилу (менше = слабший нахил)
            const tiltX = (y / rect.height) * -20; 
            const tiltY = (x / rect.width) * 20;

            tiltBox.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`;
        });

        // Повернення картки в центр, коли миша йде
        noStreamScreen.addEventListener('mouseleave', () => {
            tiltBox.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        });

        // --- ЛОГІКА YOUTUBE СТРІМУ ---
        async function checkStream() {
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=live&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                const container = document.getElementById('video-container');
                const iframe = document.getElementById('stream-iframe');

                if (data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    const newSrc = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3`;
                    
                    if (iframe.src !== newSrc) {
                        iframe.src = newSrc;
                        noStreamScreen.style.display = 'none';
                        container.style.display = 'block';
                        isLive = true;
                    }
                } else {
                    if (isLive) {
                        iframe.src = "";
                        noStreamScreen.style.display = 'flex';
                        container.style.display = 'none';
                        isLive = false;
                    }
                }
            } catch (error) {
                console.error("Системна помилка:", error);
            }
        }

        checkStream();
        setInterval(checkStream, 45000); // Перевірка кожні 45 секунд
    </script>
</body>
</html>
