<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROM TV - LIVE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Забороняємо виділення тексту для кращого інтерактиву */
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- ЛОГОТИП --- */
        .channel-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
            width: clamp(50px, 12vw, 80px);
            height: auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            pointer-events: none; 
            animation: logoFadeIn 1.5s ease-out;
        }

        @keyframes logoFadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- ЕКРАН ОЧІКУВАННЯ --- */
        #no-stream {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            text-align: center;
            background: linear-gradient(-45deg, #001220, #003049, #004d40, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 5;
            position: relative;
            overflow: hidden;
            perspective: 1000px;
            /* Важливо для мобільних: ігноруємо стандартні жести браузера */
            touch-action: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cursor-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 255, 170, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            /* Плавність для світіння */
            transition: opacity 0.5s ease;
        }

        .message-box {
            position: relative;
            z-index: 2;
            padding: clamp(30px, 10vw, 50px);
            width: 90%;
            max-width: 450px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            will-change: transform;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            margin-bottom: 10px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #a8ff78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(50px);
        }

        p {
            font-size: 1rem;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            transform: translateZ(30px);
        }

        .pulse-ring {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(0, 255, 170, 0.4);
            border-radius: 50%;
            margin: 30px auto 0;
            animation: ringPulse 2s infinite ease-out;
            transform: translateZ(20px);
        }

        @keyframes ringPulse {
            0% { transform: translateZ(20px) scale(0.8); opacity: 1; }
            100% { transform: translateZ(20px) scale(1.8); opacity: 0; }
        }

        /* --- ПЛЕЄР --- */
        #video-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            background: #000;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <img class="channel-logo" src="retouch_2026041912073655.png" alt="ROM TV">

    <div id="no-stream">
        <div class="cursor-glow" id="glow"></div>
        <div class="message-box" id="tilt-box">
            <h1>ROM TV</h1>
            <p>Скоро в ефірі</p>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <div id="video-container">
        <iframe id="stream-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const API_KEY = 'AIzaSyCV_M3wNcnpb0yuZry6MYlKevQhy0Cyta4';
        const CHANNEL_ID = 'UCnOzsQewWOgyi3ioTF_TjNA';
        
        const noStreamScreen = document.getElementById('no-stream');
        const tiltBox = document.getElementById('tilt-box');
        const glow = document.getElementById('glow');

        // Функція для обробки руху (миша або палець)
        function handleMove(e) {
            let clientX, clientY;

            if (e.type.includes('touch')) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            // Рух світіння
            glow.style.left = clientX + 'px';
            glow.style.top = clientY + 'px';
            glow.style.opacity = "1";

            // 3D нахил
            const rect = tiltBox.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const x = clientX - centerX;
            const y = clientY - centerY;
            
            const tiltX = (y / (window.innerHeight / 2)) * -25; 
            const tiltY = (x / (window.innerWidth / 2)) * 25;

            tiltBox.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.05, 1.05, 1.05)`;
        }

        function resetMove() {
            tiltBox.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            glow.style.opacity = "0";
        }

        // Події миші
        noStreamScreen.addEventListener('mousemove', handleMove);
        noStreamScreen.addEventListener('mouseleave', resetMove);

        // Події тачу (для телефонів)
        noStreamScreen.addEventListener('touchstart', handleMove, {passive: true});
        noStreamScreen.addEventListener('touchmove', handleMove, {passive: true});
        noStreamScreen.addEventListener('touchend', resetMove);

        // --- ЛОГІКА ПЕРЕВІРКИ СТРІМУ ---
        async function checkStream() {
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=live&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                const container = document.getElementById('video-container');
                const iframe = document.getElementById('stream-iframe');

                if (data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    const newSrc = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3`;
                    
                    if (iframe.src !== newSrc) {
                        iframe.src = newSrc;
                        noStreamScreen.style.display = 'none';
                        container.style.display = 'block';
                    }
                }
            } catch (e) {}
        }

        checkStream();
        setInterval(checkStream, 45000);
    </script>
</body>
</html>
